name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_16.4.app

    - name: Xcode version
      run: /usr/bin/xcodebuild -version

    # Cache resolved SPM checkouts so repeated runs don't re-download packages.
    # Cache key is tied to Package.resolved; any dependency bump busts the cache.
    - name: Cache SPM packages
      uses: actions/cache@v5
      with:
        path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('UltraKiosk.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    # `clean test` builds and runs all tests in one step.
    # CODE_SIGN_IDENTITY="" / CODE_SIGNING_REQUIRED=NO avoids certificate setup on CI.
    # -resultBundlePath writes an .xcresult bundle that is uploaded as an artifact.
    - name: Build & Test
      run: |
        xcodebuild clean test \
          -project UltraKiosk.xcodeproj \
          -scheme "UltraKiosk" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          -sdk iphonesimulator \
          -destination "platform=iOS Simulator,name=iPad (A16),OS=18.6" \
          ONLY_ACTIVE_ARCH=YES \
          SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
          OTHER_SWIFT_FLAGS="-D ED_SKIP_SWIFT_FORMAT" \
          -resultBundlePath TestResults.xcresult

    # Always upload the .xcresult bundle so failures can be inspected locally
    # via Xcode (File → Open → TestResults.xcresult).
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_number }}
        path: TestResults.xcresult
